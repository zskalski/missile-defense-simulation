<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    
    <!-- viewport is the webpage's visable area -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Missile Defense Simulator</title>

    <link rel="icon" href="assets/imgs/favicon.png" type="image/png">

    <!-- Style Sheets -->
     <link rel="stylesheet" href="css/global.css">
     <link rel="stylesheet" href="css/information-display.css">
     <link rel="stylesheet" href="css/map.css">
     <link rel="stylesheet" href="css/marginals.css">
     <link rel="stylesheet" href="css/options-menu.css">
     <link rel="stylesheet" href="css/variables.css">
     
    <!-- JavaScript Files -->
     <script src="js/common.js" defer></script> 
     <script src="js/optionsMenu.js" defer></script>
     <script src="js/mapOps.js" defer></script>
     <script src="js/main.js" defer></script>

</head>

<body>
    
    <header>
        <div><h1>Missile Defense Simulator</h1></div>
        <div><a href="https://github.com/zskalski/missile-defense-simulation">GitHub Repository</a></div>
    </header>
    
    <main>

        <!-- outer page container, holds all elements -->
        <article class="full-content-block">

            <!-- Centered Map Area -->
            <section class="map-area">

                <canvas id="mapCanvas">
                    Browser does not support HTML canvas tag.
                </canvas>

                <div class="coordinate-box" id="coordinate-box">X: - Y: -</div>

            </section>

            <!-- Right-side Options Menu for Configs -->
            <section class="options-menu">
                <!--
                    - Start / Pause / Reset Button
                    - Spawning Menu
                        * Click and drag:
                            ~ Command Center (only 1)
                            ~ Defended Asset (1 to many)
                            ~ Radar Station (0 to many)
                            ~ Interceptor (0 to many)
                            ~ Hostile Missle (0 to many)
                                - User will drag and drop missile onto map and select target, missile will automatically calculate trajectory to target or where user entered coordinates
                                - Single enemy missle (one red rocket)
                                - Enemy missile barrage (several red rockets) - tests the system.
                                - For each, user will enter the target OR enter coordinates and place it on the map. For the missile barage, they will enter how many missile they want to fire. Missiles will be fired from random edges of the map.
                    - Toggle automatic mode
                    - Radar visibility slider bar
                    - Track Visibility slider bar
                    - Simulation speed slider bar
                -->
                <div class="options-menu-title">
                    <h2> Options Menu </h2>
                </div>
                



                <!-- START / PAUSE / RESET CONTROLS -->

                <div class="menu-box state-controls">
                    <div class="button-grid">
                        <div class="sprite-button"><button class="start-button" id="start-button"><img src="assets/imgs/buttons/play-button.png" alt="Play"></button></div>
                        <div class="sprite-button"><button class="pause-button" id="pause-button"><img src="assets/imgs/buttons/pause-button.png" alt="Pause"></button></div>
                        <div class="sprite-button"><button class="reset-button" id="reset-button"><img src="assets/imgs/buttons/reset-button.png" alt="Reset"></button></div>
                    </div>

                </div>




                <!-- SPAWN MENU -->

                <div class="menu-box spawn-menu">
                    <div class="spawn-grid">

                        <div class="sprite-draggable" id="command-center-template" data-type="command-center">
                            <img src="assets/imgs/sprites/command-center.png" alt="Command Center" title="Command Center" draggable="true">
                        </div>
                        <div class="sprite-draggable" id="radar-station-template" data-type="radar">
                            <img src="assets/imgs/sprites/radar-station.png" alt="Radar Staton" title="Radar Station" draggable="true">
                        </div>
                        <div class="sprite-draggable" id="protected-target-template" data-type="protected-target">
                            <img src="assets/imgs/sprites/protected-target.png" alt="Protected Target" title="Protected Target" draggable="true">
                        </div>
                        <div class="sprite-draggable" id="interceptor-template" data-type="interceptor">
                            <img src="assets/imgs/sprites/interceptor.png" alt="Interceptor" title="Interceptor" draggable="true">
                        </div>
                        <div class="sprite-draggable" id="enemy-missile-template" data-type="enemy-missile">
                            <img src="assets/imgs/sprites/enemy-missile.png" alt="Enemy Missile" title="Enemy Missile" draggable="true">
                        </div>
                        <div class="sprite-draggable" id="enemy-missile-barrage-template" data-type="enemy-missile-barrage">
                            <img src="assets/imgs/sprites/enemy-missile-barrage.png" alt="Enemy Missile Barrage" title="Enemy Missile Barrage" draggable="true">
                        </div>
                        <div class="sprite-draggable" id="tree-template" data-type="tree">
                            <img src="assets/imgs/sprites/tree.png" alt="Tree" title="Tree" draggable="true">
                        </div>
                        <div class="sprite-draggable" id="lake-template" data-type="lake">
                            <img src="assets/imgs/sprites/lake.png" alt="Lake" title="Lake">
                        </div>

                    </div>
                </div>




                <!-- TOGGLEABLES -->

                <div class="menu-box toggle">
                    <p>Automatic Mode</p>
                    <label class="switch">
                        <div class="toggle-tooltip" id="auto-tooltip">OFF</div>
                        <input type="checkbox" id="automatic-switch">
                        <span class="toggle-slider round"></span>
                    </label>
                </div>

                <div class="menu-box toggle">
                    <p>Track Visibility</p>
                    <label class="switch">
                        <div class="toggle-tooltip" id="track-tooltip">OFF</div>
                        <input type="checkbox" id="track-switch">
                        <span class="toggle-slider round"></span>
                    </label>
                </div>

                <div class="menu-box toggle">
                    <p>Grid Lines</p>
                    <label class="switch">
                        <div class="toggle-tooltip" id="grid-tooltip">OFF</div>
                        <input type="checkbox" id="grid-switch">
                        <span class="toggle-slider round"></span>
                    </label>
                </div>




                <!-- RANGE SLIDERS -->

                <div class="menu-box radar-visibility range">
                    <p>Radar Visibility</p>
                    <div class="range-slider-container">
                        <div class="range-tooltip" id="radar-tooltip">50</div>
                        <input type="range" min="1" max="100" value="50" class="range-slider" id="radar-slider">
                    </div>
                </div>

                <div class="menu-box simulation-speed range">
                    <p>Simulation Speed</p>
                    <div class="range-slider-container">
                        <div class="range-tooltip" id="simulation-tooltip">50</div>
                        <input type="range" min="1" max="100" value="1" title="50" class="range-slider" id="simulation-slider">
                    </div>
                </div>

            </section>

            <!-- Bottom Information Display -->
             <section class="information-display"> 

                <!--
                    - Event Log
                        * EX: [00:12.400] RADAR-1 detected TGT-003
                    - Selected Object Information
                        * EX:
                            ID: TGT-003
                            Type: Hostile Missile
                            Position: (834, 211)
                            Velocity: 310 m/s
                            Status: Tracked
                            Time to Impact: 18.2s
                    - Metrics 
                        * System Mode (Manual/Automatic)
                        * Simulation Time (Min/Secs)
                        * Tick Rate 
                        * Number of Targets
                        * Number of Tracks
                        * Number of Interceptors         
                        
                    - Alert Banner
                        * Display status of the Alert:
                            ~ INTERCEPT REQUIRED
                            ~ LAUNCHER UNAVAILABLE
                            ~ TARGET IMPACTED
                            ~ HOSTILE MISSILE INTERCEPTED

                        +---------------------------------------------------+------------------+
                        | Event Log | Selected Object Details | System Status / Metrics       |
                        |                             ALERT BANNER                            |
                        +---------------------------------------------------+------------------+
                -->

                <h2> Information Display </h2>

             </section>

            
        </article>

    </main>
    
    <footer>

    </footer>



</body>

</html>
